models:
  - name: stg_thelook__users
    description: Modelo de staging para a tabela de usuários
    columns:
      - name: user_id
        description: Identificador único do usuário
        data_tests:
          - not_null
          - unique

      - name: first_name  
        description: Primeiro nome do usuário
        data_tests:
          - not_null

      - name: last_name
        description: Sobrenome do usuário
        
      - name: age
        description: Idade do usuário

      - name: gender
        description: Gênero do usuário
        data_tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']

      - name: state_name
        description: Estado de residência do usuário

      - name: country
        description: País de residência do usuário

      - name: traffic_source
        description: Fonte de tráfego do usuário

      - name: created_at
        description: Data de criação do registro
    

  - name: stg_thelook__orders
    description: Modelo de staging para a tabela de pedidos
    columns:
      - name: order_id
        description: Identificador único do pedido
        data_tests:
          - not_null
          - unique

      - name: user_id
        description: Chave estrangeira para o usuário que fez o pedido
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_thelook__users')
                field: user_id

      - name: order_status
        description: Status do pedido
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Shipped', 'Complete', 'Processing', 'Cancelled', 'Returned']

      - name: created_at
        description: Data de criação do pedido
        data_tests:
          - not_null
      
      - name: returned_at
        description: Data de devolução do pedido
      
      - name: shipped_at
        description: Data de envio do pedido
      

  - name: stg_thelook__order_items
    description: Modelo de staging para a tabela de itens do pedido
    columns:
      - name: item_id
        description: Identificador único do item do pedido
        data_tests:
          - not_null
          - unique
      
      - name: order_id
        description: Chave estrangeira para o pedido ao qual o item pertence
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_thelook__orders')
                field: order_id
      
      - name: product_id
        description: Chave estrangeira do produto do item do pedido
      
      - name: sale_price
        description: Preço de venda do item do pedido
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min: 0
                inclusive: false


  - name: stg_thelook__products
    description: Modelo de staging para a tabela de produtos
    columns:
      - name: product_id
        description: Identificador único do produto
        data_tests:
          - not_null
          - unique

      - name: product_name
        description: Nome do produto

      - name: category
        description: Categoria do produto
      
      - name: brand
        description: Marca do produto

      - name: department
        description: Departamento do produto

      - name: cost_price
        description: Preço de custo do produto
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min: 0
                inclusive: true

      - name: retail_price
        description: Preço de venda do produto
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min: 0
                inclusive: true